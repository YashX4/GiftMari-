<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>for Mari</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap"

<body>
  <main class="reel" id="reel">
    <section class="cover-card reveal">
      <p class="kicker">side A</p>
      <img class="cassette-cover" src="assets/cassette-cover.png" alt="a cassette tape labeled: I knew it was love from when I first met you" />
      <p class="lede">you say I always know what to say — but sometimes I don't.<br />so I want these to say how I feel when I'm with you.</p>
      <div class="scroll-cue" aria-hidden="true">↓</div>
    </section>

    <!-- Track cards are rendered here from TRACKS (see tracks-data.js) by love-notes.js -->

    <section class="finale-card reveal">
      <p class="kicker">side B</p>
      <h2>and this is what it feels like<br />when I'm with you</h2>
      <a class="bloom-btn" href="flower.html">watch it bloom →</a>
    </section>
  </main>

  <script src="tracks-data.js"></script>
  <script src="love-notes.js"></script>
